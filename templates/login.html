<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SaaS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="background:var(--accent-blue)"></div>
    </div>
    
    <div class="auth-container glassmorphism">
        <div class="auth-header">
            <div class="leumi-logo-container">
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Stylized Bank Logo -->
                    <rect width="100" height="100" rx="20" fill="#0072CE"/>
                    <path d="M25 50L50 25L75 50L50 75L25 50Z" fill="white"/>
                </svg>
                <h2>Bank Leumi ITSM</h2>
            </div>
            <p>SaaS Admin Team Portal</p>
        </div>
        
        <form method="POST" action="/login">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <ul class="flashes" style="color:var(--accent-red); margin-bottom:1rem; list-style:none;">
                {% for message in messages %}
                  <li>{{ message }}</li>
                {% endfor %}
                </ul>
              {% endif %}
            {% endwith %}
            
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" required placeholder="admin@leumi.co.il">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="primary-btn full-width">Sign In</button>
        </form>
    </div>
</body>
</html>
