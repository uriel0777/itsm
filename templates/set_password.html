<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Invite | SaaS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div class="auth-container glassmorphism">
        <div class="auth-header">
            <h2>Welcome to the Team</h2>
            <p>Complete your registration for {{ email }}</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="e.g. John Doe">
            </div>
            <div class="form-group">
                <label>Choose a Password</label>
                <input type="password" name="password" required minlength="6" placeholder="Strong password">
            </div>
            <button type="submit" class="primary-btn full-width">Create Account</button>
        </form>
    </div>
</body>
</html>
