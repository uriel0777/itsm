<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | SaaS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .profile-dropdown { position: relative; }
        .dropdown-menu {
            display: none; position: absolute; bottom: 100%; left: 0; background: var(--bg-color);
            border: 1px solid var(--glass-border); border-radius: var(--border-radius-md); width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); padding: 0.5rem 0; margin-bottom: 0.5rem; z-index: 1000;
        }
        .dropdown-menu.active { display: block; }
        .dropdown-item { display: block; padding: 0.75rem 1rem; color: var(--text-main); text-decoration: none; transition: background 0.2s; cursor: pointer; }
        .dropdown-item:hover { background: rgba(100,100,100,0.1); }
        .dropdown-item i { width: 20px; color: var(--text-muted); margin-right: 0.5rem; }
    </style>
</head>
<body class="theme-wrapper">
    <div class="background-effects"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

    <div class="app-container glassmorphism">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
                    <rect width="100" height="100" rx="20" fill="#0072CE"/>
                    <path d="M25 50L50 25L75 50L50 75L25 50Z" fill="white"/>
                </svg>
                <span>Leumi ITSM</span>
            </div>
            <nav>
                <a href="/"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="/analytics" class="active"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
                <a href="/assets"><i class="fa-solid fa-server"></i> Assets</a>
            </nav>
            <div class="user-profile profile-dropdown" id="profileToggle" style="cursor: pointer; position:relative;">
                <div class="avatar"><img src="https://ui-avatars.com/api/?name={{ user.name or user.email }}&background=0072CE&color=fff" alt="Avatar"></div>
                <div class="info"><span class="name">{{ user.name or user.email.split('@')[0] }}</span><span class="role">{{ user.role }}</span></div>
                <i class="fa-solid fa-chevron-up" style="color:var(--text-muted)"></i>
                
                <div class="dropdown-menu" id="profileMenu">
                    {% if user.role == 'Admin' %}
                    <a href="/settings" class="dropdown-item"><i class="fa-solid fa-gear"></i> Settings</a>
                    {% endif %}
                    <a href="/logout" class="dropdown-item" style="color:var(--accent-red)"><i class="fa-solid fa-arrow-right-from-bracket" style="color:var(--accent-red)"></i> Logout</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2>Analytics Dashboard</h2>
                <div class="actions">
                    <button class="icon-btn theme-toggle"><i class="fa-solid fa-moon"></i></button>
                    <a href="/" class="primary-btn"><i class="fa-solid fa-arrow-left"></i> Back to Tasks</a>
                </div>
            </header>

            <div class="charts-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1rem;">
                <div class="chart-container glassmorphism" style="padding: 1.5rem; border-radius:16px;">
                    <h3 style="margin-bottom:1rem; color:var(--text-muted)">Tickets by Status</h3>
                    <canvas id="statusChart"></canvas>
                </div>
                <div class="chart-container glassmorphism" style="padding: 1.5rem; border-radius:16px;">
                    <h3 style="margin-bottom:1rem; color:var(--text-muted)">Workload by Assignee</h3>
                    <canvas id="assigneeChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Script -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Profile Dropsown
            const profileToggle = document.getElementById('profileToggle');
            const profileMenu = document.getElementById('profileMenu');
            profileToggle.addEventListener('click', (e) => {
                if(e.target.closest('.dropdown-item')) return;
                profileMenu.classList.toggle('active');
            });
            document.addEventListener('click', (e) => {
                if(!profileToggle.contains(e.target)) profileMenu.classList.remove('active');
            });

            // Theme setup
            const themeBtn = document.querySelector('.theme-toggle');
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('light-theme');
                localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
            });
            if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-theme'); }

            // Fetch Stats
            const res = await fetch('/api/stats');
            const data = await res.json();
            Chart.defaults.color = '#94a3b8';

            // Status Chart
            new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data.status),
                    datasets: [{
                        data: Object.values(data.status),
                        backgroundColor: ['#8b5cf6', '#f59e0b', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, cutout: '70%' }
            });

            // Assignee Chart
            new Chart(document.getElementById('assigneeChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.assignee),
                    datasets: [{
                        label: 'Tickets',
                        data: Object.values(data.assignee),
                        backgroundColor: '#0ea5e9',
                        borderRadius: 6
                    }]
                },
                options: { 
                    responsive: true,
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } }
                }
            });
        });
    </script>
</body>
</html>
